# Infrastructure ONLY — the stateful/backing services every app service leans on.
# Kept separate from docker-compose.yml (the app services) because infra and app
# code have different lifecycles: you rebuild services dozens of times a day, but
# you want Postgres/Redis data to survive those rebuilds. `make up` runs both
# files together; `make infra-up` runs just this one.

name: ecommerce-infra

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: ecommerce            # bootstrap db; per-service dbs created by initdb.sql
    ports:
      # host:container. Mapped to 5433 on the host to avoid clashing with a
      # native Postgres often already running on 5432. App services talk to
      # "postgres:5432" over the compose network and are unaffected by this.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Files in this dir run ONCE, on first init of an empty data volume.
      - ./deploy/postgres/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql:ro
    healthcheck:
      # pg_isready is Postgres' own readiness probe. -U/-d must match so we test
      # the actual role, not just "is the port open".
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [ecommerce]

  redis:
    image: redis:7-alpine
    # appendonly yes -> AOF persistence, so the cart survives a restart (Phase 3
    # acceptance criterion). Without it Redis is purely in-memory.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]   # expects "PONG"
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [ecommerce]

  nats:
    image: nats:2.10-alpine
    # -js enables JetStream (durable streams). -m 8222 opens the HTTP monitoring
    # port we healthcheck against. -sd sets the JetStream storage dir (persisted).
    command: ["-js", "-m", "8222", "-sd", "/data"]
    ports:
      - "4222:4222"   # client connections
      - "8222:8222"   # monitoring / healthz
    volumes:
      - natsdata:/data
    healthcheck:
      # busybox wget ships in the alpine image; /healthz returns 200 when ready.
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [ecommerce]

  # Mailpit: a local SMTP catcher for the native-dev stack. Verification / order
  # emails land in its web UI (http://localhost:8025) instead of a real inbox —
  # the email analog of the mock payment provider. Set NOTIFY_SENDER=smtp +
  # SMTP_ADDR=localhost:1025 (dev-backend.sh does this) to use it.
  mailpit:
    image: axllent/mailpit:v1.20
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI
    networks: [ecommerce]

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"     # accept OTLP on 4317/4318 (we'll send here in Phase 6)
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    networks: [ecommerce]
    # No healthcheck: nothing in Phase 0 gates on Jaeger being ready, and its
    # image is too minimal to run a shell-based probe reliably. Revisit in Phase 6.

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      # Host 9091 -> container 9090. Mapped off 9090 to avoid clashing with a
      # process already bound to 9090 on this host (same reason Postgres uses
      # 5433). Inside the compose network Prometheus is still :9090.
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    # Lets the container resolve host.docker.internal -> the Docker host, so
    # Prometheus can scrape services still running on the host (the Phase 0 hello
    # service). On Linux this needs the explicit host-gateway mapping.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [ecommerce]

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    # S3-compatible object store for product images. Code targets the S3 API, so
    # production swaps the endpoint for Cloudflare R2 / AWS S3 with no code change
    # — the same "mock locally, real adapter in prod" pattern as payments/notify.
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [ecommerce]

  # One-shot: creates the product-images bucket and makes it publicly downloadable
  # so the storefront <img src> can load images directly (no CDN yet — in prod
  # you'd front a private bucket with a CDN). It's behind the "init" profile so a
  # plain `up --wait` doesn't try to wait on a container that exits; `make infra-up`
  # runs it explicitly after MinIO is healthy. The mb step is made idempotent so a
  # repeat run against an existing bucket still succeeds.
  createbuckets:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    profiles: ["init"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      (mc mb -p local/product-images || true) &&
      mc anonymous set download local/product-images
      "
    networks: [ecommerce]

# Named volumes: data lives here independent of container lifecycle. `make down`
# keeps them; `make down-v` wipes them (and re-triggers postgres initdb on next up).
volumes:
  pgdata:
  redisdata:
  natsdata:
  miniodata:

# One user-defined bridge network so app services can reach infra by service name
# (e.g. "postgres:5432") via Docker's built-in DNS.
networks:
  ecommerce:
    driver: bridge
