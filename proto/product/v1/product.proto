syntax = "proto3";

package product.v1;

// ProductService owns the catalog and inventory. It is the only service that
// touches productdb. Other services (Order) ask it for prices and stock — they
// never read its tables directly.
service ProductService {
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);

  // Saga surface. All keyed on reservation_id and idempotent.
  rpc ReserveStock(ReserveStockRequest) returns (ReserveStockResponse);
  rpc ReleaseStock(ReleaseStockRequest) returns (ReleaseStockResponse); // compensate
  rpc CommitStock(CommitStockRequest) returns (CommitStockResponse);    // finalize
}

message ReserveItem {
  string product_id = 1;
  int32 quantity = 2;
}
message ReserveStockRequest {
  string reservation_id = 1; // idempotency key, supplied by the saga
  repeated ReserveItem items = 2;
}
message ReserveStockResponse {
  // false = insufficient stock. This is a normal business outcome the saga acts
  // on, NOT an RPC error.
  bool success = 1;
}

message ReleaseStockRequest {
  string reservation_id = 1;
}
message ReleaseStockResponse {}

message CommitStockRequest {
  string reservation_id = 1;
}
message CommitStockResponse {}

// Product is the catalog view. price_cents is integer minor units; available is
// the live sellable quantity (quantity - reserved).
message Product {
  string id = 1;
  string sku = 2;
  string name = 3;
  string description = 4;
  int64 price_cents = 5;
  string currency = 6;
  string category_id = 7; // empty when uncategorized
  int32 available = 8;
  int64 created_at = 9; // unix seconds
  string image_url = 10; // optional catalog image; empty = none (renders a placeholder)
}

message CreateProductRequest {
  string sku = 1;
  string name = 2;
  string description = 3;
  int64 price_cents = 4;
  string currency = 5;          // defaults to NGN if empty
  string category_id = 6;       // optional
  int32 initial_quantity = 7;   // seeds the inventory row
  string image_url = 8;         // optional; stored as-is
}
message CreateProductResponse {
  Product product = 1;
}

message GetProductRequest {
  string product_id = 1;
}
message GetProductResponse {
  Product product = 1;
}

message ListProductsRequest {
  int32 page = 1;        // 1-based; defaults to 1
  int32 page_size = 2;   // defaults to 20, capped at 100
  string category_id = 3; // empty = all categories
  string search = 4;      // empty = no name filter; else case-insensitive substring
}
message ListProductsResponse {
  repeated Product products = 1;
  int64 total = 2; // total matching the filter, for pagination
}
