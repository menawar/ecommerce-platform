syntax = "proto3";

package order.v1;

// OrderService is the saga orchestrator's API. PlaceOrder turns the caller's cart
// into a paid order (or a cancelled one on failure); it is idempotent on
// idempotency_key. user_id is filled by the gateway from the JWT.
service OrderService {
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);

  // --- Shipping methods. List serves checkout (active_only) and the admin list
  // (all); create/update/delete are admin-only (the Gateway enforces the role). ---
  rpc ListShippingMethods(ListShippingMethodsRequest) returns (ListShippingMethodsResponse);
  rpc CreateShippingMethod(CreateShippingMethodRequest) returns (CreateShippingMethodResponse);
  rpc UpdateShippingMethod(UpdateShippingMethodRequest) returns (UpdateShippingMethodResponse);
  rpc DeleteShippingMethod(DeleteShippingMethodRequest) returns (DeleteShippingMethodResponse);

  // --- Fulfillment (admin-only; the Gateway enforces the role). ---
  rpc MarkShipped(MarkShippedRequest) returns (MarkShippedResponse);
  rpc MarkDelivered(MarkDeliveredRequest) returns (MarkDeliveredResponse);
  rpc ListAllOrders(ListAllOrdersRequest) returns (ListAllOrdersResponse);
}

message ShippingMethod {
  string id = 1;
  string name = 2;
  string description = 3;
  int64 price_cents = 4;
  int32 sort_order = 5;
  bool active = 6;
}

// ShippingMethodInput carries the mutable fields shared by create + update.
message ShippingMethodInput {
  string name = 1;
  string description = 2;
  int64 price_cents = 3;
  int32 sort_order = 4;
  bool active = 5;
}

message ListShippingMethodsRequest {
  bool active_only = 1; // true at checkout; false for the admin list
}
message ListShippingMethodsResponse {
  repeated ShippingMethod methods = 1;
}

message CreateShippingMethodRequest {
  ShippingMethodInput method = 1;
}
message CreateShippingMethodResponse {
  ShippingMethod method = 1;
}

message UpdateShippingMethodRequest {
  string id = 1;
  ShippingMethodInput method = 2;
}
message UpdateShippingMethodResponse {
  ShippingMethod method = 1;
}

message DeleteShippingMethodRequest {
  string id = 1;
}
message DeleteShippingMethodResponse {}

message OrderItem {
  string product_id = 1;
  string name = 2;        // snapshot at order time
  int64 price_cents = 3;  // snapshot at order time
  int32 quantity = 4;
}

// ShippingAddress is the address SNAPSHOT taken at checkout (a copy of the user's
// chosen address), so later edits to their address book never alter past orders.
message ShippingAddress {
  string recipient = 1;
  string phone = 2;
  string line1 = 3;
  string line2 = 4;
  string city = 5;
  string state = 6;
  string postal_code = 7;
  string country = 8;
}

message Order {
  string id = 1;
  string user_id = 2;
  string status = 3;
  int64 total_cents = 4; // subtotal + shipping
  string currency = 5;
  string payment_id = 6; // empty until paid
  repeated OrderItem items = 7;
  int64 created_at = 8;
  int64 shipping_cents = 9;
  string shipping_method_name = 10;
  ShippingAddress shipping_address = 11;
  string tracking_number = 12;
  int64 shipped_at = 13;   // unix seconds; 0 until shipped
  int64 delivered_at = 14; // unix seconds; 0 until delivered
}

message PlaceOrderRequest {
  string user_id = 1;
  string idempotency_key = 2;
  string address_id = 3;         // a saved address of the caller's
  string shipping_method_id = 4; // an active shipping method
}
message PlaceOrderResponse {
  string order_id = 1;
  string status = 2; // PAYMENT_PENDING (terminal status arrives once payment settles)
  // authorization_url is where the customer must go to authorize payment (the PSP
  // hosted page). Empty when the order failed before payment (e.g. out of stock).
  string authorization_url = 3;
}

message GetOrderRequest {
  string order_id = 1;
}
message GetOrderResponse {
  Order order = 1;
}

message ListOrdersRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}
message ListOrdersResponse {
  repeated Order orders = 1; // without items (summary view)
}

message CancelOrderRequest {
  string order_id = 1;
}
message CancelOrderResponse {
  string status = 1;
}

message MarkShippedRequest {
  string order_id = 1;
  string tracking_number = 2; // optional
}
message MarkShippedResponse {
  Order order = 1;
}

message MarkDeliveredRequest {
  string order_id = 1;
}
message MarkDeliveredResponse {
  Order order = 1;
}

message ListAllOrdersRequest {
  int32 page = 1;
  int32 page_size = 2;
}
message ListAllOrdersResponse {
  repeated Order orders = 1;
}
