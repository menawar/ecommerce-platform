
syntax = "proto3";

package payment.v1;

// PaymentService processes charges. It runs in mock mode by default (a
// deterministic MockProvider); the real adapter is Paystack (NGN).
// InitializePayment is idempotent on idempotency_key — the Order saga may retry,
// and a retry must never charge twice.
service PaymentService {
  // InitializePayment starts an ASYNCHRONOUS charge with a redirect-based PSP
  // (Paystack): it returns an authorization_url to send the customer to and a
  // payment in 'pending'. The real outcome arrives later via webhook.
  rpc InitializePayment(InitializePaymentRequest) returns (InitializePaymentResponse);
  rpc GetPayment(GetPaymentRequest) returns (GetPaymentResponse);
  // RefundPayment reverses a succeeded charge (synchronous). Idempotent: refunding
  // an already-refunded payment returns success.
  rpc RefundPayment(RefundPaymentRequest) returns (RefundPaymentResponse);
}

message Payment {
  string id = 1;
  string order_id = 2;
  int64 amount_cents = 3;
  string currency = 4;
  string status = 5;       // pending | succeeded | failed
  string provider = 6;     // mock | paystack
  string provider_ref = 7; // the provider's charge reference
  int64 created_at = 8;
}

message InitializePaymentRequest {
  string order_id = 1;
  int64 amount_cents = 2;
  string currency = 3;
  string idempotency_key = 4;
  string email = 5; // the PSP requires the customer's email to start a charge
}
message InitializePaymentResponse {
  string payment_id = 1;
  string status = 2;            // pending (terminal status arrives via webhook)
  string authorization_url = 3; // where to send the customer to authorize payment
}

message GetPaymentRequest {
  string payment_id = 1;
}
message GetPaymentResponse {
  Payment payment = 1;
}

message RefundPaymentRequest {
  string payment_id = 1;
}
message RefundPaymentResponse {
  string status = 1; // refunded
}
