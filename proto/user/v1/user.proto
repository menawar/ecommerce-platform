syntax = "proto3";

package user.v1;

// UserService owns identity. It is the ONLY service that may touch userdb;
// every other service learns who the caller is from the signed JWT, never by
// reading this service's tables. That is the database-per-service rule made
// concrete at the contract level.
service UserService {
  // Register creates an account and returns its server-generated id.
  rpc Register(RegisterRequest) returns (RegisterResponse);
  // Login verifies credentials and issues tokens.
  rpc Login(LoginRequest) returns (LoginResponse);
  // ValidateToken is called by the Gateway on every protected request to check
  // an access token and extract the caller's identity. Keeping validation here
  // (not in the Gateway) means only the User service needs the signing secret.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  // GetUser returns a user's profile by id, for server-to-server use (e.g. the
  // Order saga resolving the customer's email for a payment receipt). It never
  // exposes the password hash.
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  // RefreshToken rotates a refresh token: it validates + revokes the presented
  // refresh token and mints a fresh access + refresh pair. Reuse of an
  // already-revoked token revokes the whole session (theft detection).
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  // Logout revokes the presented refresh token, ending that session server-side.
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  // VerifyEmail consumes a single-use token (from the emailed link) and marks the
  // account's email verified. It is public — the token itself is the credential.
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  // ResendVerification issues a fresh verification token for the caller. The
  // Gateway gates this behind auth and supplies user_id from the validated token.
  rpc ResendVerification(ResendVerificationRequest) returns (ResendVerificationResponse);
  // RequestPasswordReset emails a single-use reset link. It is public and ALWAYS
  // succeeds (even for an unknown email) so the response can't reveal which
  // addresses have accounts.
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);
  // ResetPassword consumes a reset token and sets a new password, revoking the
  // user's existing sessions. Public — the token is the credential.
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);

  // DeleteUser erases the caller's account (NDPR/GDPR right to erasure): it
  // anonymises the users row (PII tombstoned), purges addresses + sessions, and
  // emits user.deleted so other services anonymise their copies. Idempotent. The
  // Gateway supplies user_id from the validated JWT.
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);

  // --- Address book (all authed; user_id is filled by the Gateway from the JWT) ---
  rpc CreateAddress(CreateAddressRequest) returns (CreateAddressResponse);
  rpc ListAddresses(ListAddressesRequest) returns (ListAddressesResponse);
  // GetAddress fetches one of the caller's addresses by id, scoped by user_id.
  // Used server-to-server by the Order saga to snapshot the chosen address.
  rpc GetAddress(GetAddressRequest) returns (GetAddressResponse);
  rpc UpdateAddress(UpdateAddressRequest) returns (UpdateAddressResponse);
  rpc DeleteAddress(DeleteAddressRequest) returns (DeleteAddressResponse);
  rpc SetDefaultAddress(SetDefaultAddressRequest) returns (SetDefaultAddressResponse);
}

// Address is a saved shipping address. created_at is unix seconds.
message Address {
  string id = 1;
  string user_id = 2;
  string label = 3;
  string recipient = 4;
  string phone = 5;
  string line1 = 6;
  string line2 = 7;
  string city = 8;
  string state = 9;
  string postal_code = 10;
  string country = 11;
  bool is_default = 12;
  int64 created_at = 13;
}

// AddressInput carries the mutable fields shared by create + update.
message AddressInput {
  string label = 1;
  string recipient = 2;
  string phone = 3;
  string line1 = 4;
  string line2 = 5;
  string city = 6;
  string state = 7;
  string postal_code = 8;
  string country = 9;
}

message CreateAddressRequest {
  string user_id = 1;
  AddressInput address = 2;
  bool is_default = 3;
}
message CreateAddressResponse {
  Address address = 1;
}

message ListAddressesRequest {
  string user_id = 1;
}
message ListAddressesResponse {
  repeated Address addresses = 1;
}

message GetAddressRequest {
  string user_id = 1;
  string address_id = 2;
}
message GetAddressResponse {
  Address address = 1;
}

message UpdateAddressRequest {
  string user_id = 1;
  string address_id = 2;
  AddressInput address = 3;
}
message UpdateAddressResponse {}

message DeleteAddressRequest {
  string user_id = 1;
  string address_id = 2;
}
message DeleteAddressResponse {}

message SetDefaultAddressRequest {
  string user_id = 1;
  string address_id = 2;
}
message SetDefaultAddressResponse {}

message RegisterRequest {
  string email = 1;
  // Plaintext on the wire only — TLS protects it in transit, the server hashes
  // it immediately, and it is NEVER stored.
  string password = 2;
  string full_name = 3;
}

message RegisterResponse {
  string user_id = 1; // server-generated UUID
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;  // short-lived JWT (TTL 15m)
  string refresh_token = 2; // long-lived token to mint new access tokens (TTL 7d)
  int64 expires_at = 3;     // access_token expiry, unix seconds
}

message RefreshTokenRequest {
  string refresh_token = 1;
}
message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2; // a NEW refresh token (the old one is now revoked)
  int64 expires_at = 3;     // access_token expiry, unix seconds
}

message LogoutRequest {
  string refresh_token = 1;
}
message LogoutResponse {}

message GetUserRequest {
  string user_id = 1;
}
message GetUserResponse {
  string user_id = 1;
  string email = 2;
  string full_name = 3;
  string role = 4;
  bool email_verified = 5;
}

message VerifyEmailRequest {
  string token = 1; // the single-use token from the verification link
}
message VerifyEmailResponse {}

message ResendVerificationRequest {
  string user_id = 1; // the authenticated caller, supplied by the Gateway
}
message ResendVerificationResponse {}

message RequestPasswordResetRequest {
  string email = 1;
}
message RequestPasswordResetResponse {}

message ResetPasswordRequest {
  string token = 1;        // the single-use token from the reset link
  string new_password = 2; // plaintext on the wire (TLS); hashed immediately
}
message ResetPasswordResponse {}

message DeleteUserRequest {
  string user_id = 1;
}
message DeleteUserResponse {}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;      // false rather than an error for an ordinary expired/bad token
  string user_id = 2;  // the JWT "sub" claim
  string role = 3;     // "customer" | "admin"
}
