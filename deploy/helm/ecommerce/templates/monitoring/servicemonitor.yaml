{{- if .Values.metrics.serviceMonitor.enabled }}
{{- range $name, $svc := .Values.services }}
---
# Tells the Prometheus Operator to scrape this service's /metrics endpoint.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $name }}
  labels:
    {{- include "ecommerce.selectorLabels" (dict "name" $name) | nindent 4 }}
    {{- with $.Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels: {{- include "ecommerce.selectorLabels" (dict "name" $name) | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ $.Values.metrics.serviceMonitor.interval }}
{{- end }}
{{- end }}
