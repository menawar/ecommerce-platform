{{- if .Values.infra.enabled }}
# Postgres for local/kind: one instance, per-service databases created by the
# init script (database-per-service). NOT for production — use a managed Postgres
# (set infra.enabled=false) where backups/HA/PITR are handled for you.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  labels:
    app.kubernetes.io/part-of: ecommerce
data:
  initdb.sql: |
{{ .Files.Get "files/initdb.sql" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels: {{- include "ecommerce.selectorLabels" (dict "name" "postgres") | nindent 4 }}
spec:
  clusterIP: None # headless: StatefulSet needs stable network identity
  selector: {{- include "ecommerce.selectorLabels" (dict "name" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels: {{- include "ecommerce.labels" (dict "name" "postgres" "root" $) | nindent 4 }}
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: {{- include "ecommerce.selectorLabels" (dict "name" "postgres") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "ecommerce.selectorLabels" (dict "name" "postgres") | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.infra.postgres.image }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.infra.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.infra.postgres.password | quote }}
            - name: POSTGRES_DB
              value: ecommerce # bootstrap db; per-service dbs come from initdb.sql
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.infra.postgres.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: initdb
          configMap:
            name: postgres-initdb
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.infra.postgres.storage }}
{{- end }}
