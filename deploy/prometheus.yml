# Prometheus scrape config. For now it only scrapes itself — there are no app
# services yet. As each service exposes /metrics (Phase 6), we add a job here
# pointing at "<service>:<port>". Inside the compose network, targets are
# reachable by service name.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Phase 0 throwaway hello service. It runs on the HOST (not yet containerized),
  # so from inside the Prometheus container we reach it via host.docker.internal
  # — which resolves to the host thanks to the extra_hosts mapping in the compose
  # file. Once services are containerized they'll be scraped by service name.
  - job_name: hello
    static_configs:
      - targets: ["host.docker.internal:2112"]

  # Placeholder for later — uncomment/extend as services come online:
  # - job_name: gateway
  #   static_configs:
  #     - targets: ["gateway:9100"]
