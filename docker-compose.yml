name: ecommerce-app

services:
  user:
    build:
      context: .
      dockerfile: services/user/Dockerfile
    environment:
      USER_GRPC_ADDR: ":50051"
      USER_HTTP_ADDR: ":2112"
      USER_DB_URL: "postgres://ecommerce:ecommerce@postgres:5432/userdb?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      JWT_SECRET: "dev-insecure-secret"
      OTEL_ENDPOINT: "jaeger:4317"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:2112/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - ecommerce

  product:
    build:
      context: .
      dockerfile: services/product/Dockerfile
    environment:
      PRODUCT_GRPC_ADDR: ":50052"
      PRODUCT_HTTP_ADDR: ":2113"
      PRODUCT_DB_URL: "postgres://ecommerce:ecommerce@postgres:5432/productdb?sslmode=disable"
      OTEL_ENDPOINT: "jaeger:4317"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:2113/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce

  cart:
    build:
      context: .
      dockerfile: services/cart/Dockerfile
    environment:
      CART_GRPC_ADDR: ":50053"
      CART_HTTP_ADDR: ":2114"
      REDIS_URL: "redis://redis:6379/0"
      OTEL_ENDPOINT: "jaeger:4317"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:2114/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ecommerce

  payment:
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    environment:
      PAYMENT_GRPC_ADDR: ":50054"
      PAYMENT_HTTP_ADDR: ":2115"
      PAYMENT_DB_URL: "postgres://ecommerce:ecommerce@postgres:5432/paymentdb?sslmode=disable"
      OTEL_ENDPOINT: "jaeger:4317"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:2115/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce

  order:
    build:
      context: .
      dockerfile: services/order/Dockerfile
    environment:
      ORDER_GRPC_ADDR: ":50055"
      ORDER_HTTP_ADDR: ":2116"
      ORDER_DB_URL: "postgres://ecommerce:ecommerce@postgres:5432/orderdb?sslmode=disable"
      CART_GRPC_ADDR: "cart:50053"
      PRODUCT_GRPC_ADDR: "product:50052"
      PAYMENT_GRPC_ADDR: "payment:50054"
      NATS_URL: "nats://nats:4222"
      OTEL_ENDPOINT: "jaeger:4317"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:2116/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      cart:
        condition: service_healthy
      product:
        condition: service_healthy
      payment:
        condition: service_healthy
    networks:
      - ecommerce

  notification:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    environment:
      NOTIFICATION_HTTP_ADDR: ":2117"
      NOTIFICATION_DB_URL: "postgres://ecommerce:ecommerce@postgres:5432/notificationdb?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      OTEL_ENDPOINT: "jaeger:4317"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:2117/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - ecommerce

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      GATEWAY_HTTP_ADDR: ":8080"
      USER_GRPC_ADDR: "user:50051"
      PRODUCT_GRPC_ADDR: "product:50052"
      CART_GRPC_ADDR: "cart:50053"
      ORDER_GRPC_ADDR: "order:50055"
      JWT_SECRET: "dev-insecure-secret"
      OTEL_ENDPOINT: "jaeger:4317"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      user:
        condition: service_healthy
      product:
        condition: service_healthy
      cart:
        condition: service_healthy
      order:
        condition: service_healthy
    networks:
      - ecommerce

networks:
  ecommerce:
    driver: bridge
